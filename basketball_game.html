<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>篮球投篮游戏</title>
  <style>
    :root {
      color-scheme: dark;
      --court-black: #090a0d;
      --panel: #15171d;
      --panel-raised: #1d2028;
      --line: #343844;
      --text: #f7f8fa;
      --muted: #b9bec9;
      --orange: #ff7a1a;
      --orange-light: #ffad5c;
      --green: #36c96b;
      --shadow: 0 20px 50px rgb(0 0 0 / 35%);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
      background: var(--court-black);
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at 50% -20%, rgb(255 122 26 / 20%), transparent 42%),
        linear-gradient(135deg, transparent 0 49%, rgb(255 255 255 / 2%) 49% 51%, transparent 51%) 0 0 / 34px 34px,
        var(--court-black);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      line-height: 1.5;
    }

    button {
      font: inherit;
    }

    button:focus-visible {
      outline: 3px solid #ffffff;
      outline-offset: 4px;
    }

    .game-shell {
      width: min(100% - 32px, 1040px);
      margin-inline: auto;
      padding: 28px 0 36px;
    }

    .game-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 18px;
    }

    .school-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .school-mark {
      display: grid;
      flex: 0 0 46px;
      width: 46px;
      height: 46px;
      place-items: center;
      border: 2px solid var(--orange);
      border-radius: 50%;
      color: var(--orange-light);
      box-shadow: inset 0 0 0 5px rgb(255 122 26 / 12%);
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .brand-copy {
      min-width: 0;
    }

    .school-name {
      margin: 0 0 2px;
      color: var(--orange-light);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.08em;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 4vw, 2.6rem);
      line-height: 1.1;
      letter-spacing: -0.04em;
    }

    .round-rule {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .status-card {
      position: relative;
      min-width: 0;
      padding: 13px 16px 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(145deg, var(--panel-raised), var(--panel));
      box-shadow: 0 8px 24px rgb(0 0 0 / 20%);
    }

    .status-card::before {
      position: absolute;
      inset: 0 auto 0 0;
      width: 3px;
      background: var(--orange);
      content: "";
    }

    .status-label {
      display: block;
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .status-value {
      display: block;
      margin-top: 2px;
      overflow: hidden;
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: 900;
      line-height: 1.1;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-unit {
      margin-left: 3px;
      color: var(--orange-light);
      font-size: 0.72em;
      font-weight: 700;
    }

    .court-panel {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .canvas-wrap {
      position: relative;
      aspect-ratio: 16 / 8.8;
      overflow: hidden;
      border-radius: 10px;
      background:
        linear-gradient(180deg, #1b1e25 0 66%, #5d331f 66% 68%, #a75829 68% 100%);
    }

    .canvas-wrap::after {
      position: absolute;
      right: 10%;
      bottom: 0;
      width: 26%;
      height: 26%;
      border: 2px solid rgb(255 255 255 / 35%);
      border-bottom: 0;
      border-radius: 50% 50% 0 0;
      content: "";
      pointer-events: none;
    }

    #gameCanvas {
      position: relative;
      z-index: 1;
      display: block;
      width: 100%;
      height: 100%;
    }

    .status-message {
      min-height: 24px;
      margin: 10px 4px 0;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    .controls-panel {
      display: grid;
      grid-template-columns: minmax(92px, 0.42fr) minmax(220px, 1.7fr) minmax(150px, 0.7fr);
      align-items: center;
      gap: 18px;
      margin-top: 12px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgb(21 23 29 / 94%);
      box-shadow: 0 12px 30px rgb(0 0 0 / 25%);
    }

    .countdown {
      text-align: center;
    }

    .control-label {
      display: block;
      margin-bottom: 3px;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    #countdownValue {
      color: var(--orange-light);
      font-size: clamp(2rem, 5vw, 3rem);
      font-variant-numeric: tabular-nums;
      font-weight: 900;
      line-height: 1;
    }

    .timing-meter {
      position: relative;
      height: 38px;
      overflow: hidden;
      border: 2px solid #4d515e;
      border-radius: 999px;
      background: linear-gradient(90deg, #712c22, #c66f24 35%, #c66f24 65%, #712c22);
      box-shadow: inset 0 3px 8px rgb(0 0 0 / 45%);
    }

    .best-zone {
      position: absolute;
      inset: 0 42%;
      display: grid;
      place-items: center;
      color: #07170d;
      background: var(--green);
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 0.08em;
    }

    .meter-needle {
      position: absolute;
      z-index: 2;
      top: 2px;
      bottom: 2px;
      left: 50%;
      width: 4px;
      border-radius: 4px;
      background: #ffffff;
      box-shadow: 0 0 0 2px rgb(0 0 0 / 45%), 0 0 12px rgb(255 255 255 / 70%);
      transform: translateX(-50%);
    }

    .meter-caption {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.72rem;
    }

    .shoot-button,
    .dialog-button {
      min-height: 52px;
      border: 0;
      border-radius: 12px;
      color: #1b0b00;
      background: linear-gradient(180deg, #ff9a43, var(--orange));
      box-shadow: 0 8px 0 #a94408, 0 13px 22px rgb(0 0 0 / 28%);
      cursor: pointer;
      font-weight: 900;
      letter-spacing: 0.08em;
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
    }

    .shoot-button:hover,
    .dialog-button:hover {
      filter: brightness(1.08);
      transform: translateY(-2px);
    }

    .shoot-button:active,
    .dialog-button:active {
      box-shadow: 0 4px 0 #a94408, 0 8px 16px rgb(0 0 0 / 28%);
      transform: translateY(4px);
    }

    .key-hint {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
    }

    kbd {
      display: inline-block;
      margin: 0 4px;
      padding: 2px 9px;
      border: 1px solid #555a67;
      border-bottom-width: 3px;
      border-radius: 5px;
      color: var(--text);
      background: #252832;
      font: 700 0.75rem/1.4 inherit;
    }

    .game-dialog {
      position: fixed;
      z-index: 50;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgb(5 6 8 / 78%);
      backdrop-filter: blur(8px);
    }

    [hidden] {
      display: none !important;
    }

    .dialog-backdrop {
      overflow-y: auto;
    }

    .dialog-card {
      width: min(100%, 440px);
      max-height: calc(100vh - 40px);
      padding: 30px;
      overflow-y: auto;
      border: 1px solid #454956;
      border-top: 4px solid var(--orange);
      border-radius: 18px;
      background: linear-gradient(145deg, #22252e, #14161b);
      box-shadow: 0 30px 80px rgb(0 0 0 / 55%);
      text-align: center;
    }

    .dialog-mark {
      width: 64px;
      height: 64px;
      margin: 0 auto 18px;
      border: 3px solid var(--orange);
      border-radius: 50%;
      background:
        linear-gradient(90deg, transparent 46%, var(--orange) 46% 54%, transparent 54%),
        linear-gradient(0deg, transparent 46%, var(--orange) 46% 54%, transparent 54%);
      box-shadow: inset 0 0 0 6px rgb(255 122 26 / 12%);
    }

    .dialog-card h2 {
      margin: 0;
      font-size: 1.65rem;
    }

    .dialog-card p {
      margin: 10px auto 24px;
      color: var(--muted);
      max-width: 34ch;
    }

    .dialog-button {
      width: 100%;
    }

    @media (max-width: 640px) {
      .game-shell {
        width: min(100% - 20px, 1040px);
        padding-top: 18px;
      }

      .game-header {
        align-items: start;
        flex-direction: column;
        gap: 7px;
      }

      .school-brand {
        gap: 9px;
      }

      .school-mark {
        flex-basis: 40px;
        width: 40px;
        height: 40px;
      }

      .school-name {
        font-size: 0.72rem;
        letter-spacing: 0.04em;
      }

      .status-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .status-card {
        padding: 10px 13px 11px;
      }

      .court-panel {
        padding: 6px;
      }

      .controls-panel {
        grid-template-columns: 76px minmax(0, 1fr);
        gap: 13px;
        padding: 14px;
      }

      .shoot-button {
        grid-column: 1 / -1;
      }

      .key-hint {
        display: none;
      }

      .dialog-card {
        padding: 26px 22px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <main class="game-shell" aria-labelledby="gameTitle" inert>
    <header class="game-header">
      <div class="school-brand">
        <span class="school-mark" aria-hidden="true">FZ</span>
        <div class="brand-copy">
          <p class="school-name">福州软件职业学院</p>
          <h1 id="gameTitle">压哨投篮</h1>
        </div>
      </div>
      <p class="round-rule">每关 10 次机会，获得 60 分即可晋级</p>
    </header>

    <section class="status-grid" aria-label="比赛状态">
      <div class="status-card">
        <span class="status-label">当前关卡</span>
        <strong class="status-value"><span id="levelValue">1</span><span class="status-unit">/ 10</span></strong>
      </div>
      <div class="status-card">
        <span class="status-label">本关得分</span>
        <strong class="status-value"><span id="scoreValue">0</span><span class="status-unit">分</span></strong>
      </div>
      <div class="status-card">
        <span class="status-label">剩余投篮</span>
        <strong class="status-value"><span id="shotsValue">10</span><span class="status-unit">次</span></strong>
      </div>
      <div class="status-card">
        <span class="status-label">单次限时</span>
        <strong class="status-value"><span id="timeValue">5.0</span><span class="status-unit">秒</span></strong>
      </div>
    </section>

    <section class="court-panel" aria-label="篮球比赛区域">
      <div class="canvas-wrap">
        <canvas id="gameCanvas" width="960" height="528" aria-label="篮球场游戏画面">
          篮球场游戏画面无法显示，请使用支持 HTML5 Canvas 的浏览器。
        </canvas>
      </div>
      <p id="statusMessage" class="status-message" aria-live="polite">准备好后开始挑战，瞄准最佳时机完成投篮。</p>
    </section>

    <section class="controls-panel" aria-label="投篮控制">
      <div class="countdown">
        <span class="control-label">剩余时间</span>
        <strong id="countdownValue">5.0</strong>
      </div>
      <div>
        <span class="control-label">投篮时机</span>
        <div class="timing-meter" role="meter" aria-label="投篮时机" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50">
          <span class="best-zone">最佳</span>
          <span id="meterNeedle" class="meter-needle" aria-hidden="true"></span>
        </div>
        <div class="meter-caption" aria-hidden="true"><span>过早</span><span>过晚</span></div>
      </div>
      <button id="shootButton" class="shoot-button" type="button" aria-label="投篮">投篮</button>
    </section>
    <p class="key-hint">按下 <kbd>空格键</kbd> 也可以投篮</p>
  </main>

  <div id="gameDialog" class="game-dialog dialog-backdrop" role="dialog" aria-modal="true" aria-labelledby="dialogTitle" aria-describedby="dialogMessage">
    <div class="dialog-card">
      <div class="dialog-mark" aria-hidden="true"></div>
      <h2 id="dialogTitle">准备上场</h2>
      <p id="dialogMessage">每关 10 次投篮机会，达到 60 分即可晋级；在绿色最佳区域投篮。</p>
      <button id="dialogButton" class="dialog-button" type="button" autofocus>开始挑战</button>
    </div>
  </div>

  <script id="game-core">
    const TIME_LIMITS = Object.freeze([5, 4.6, 4.2, 3.8, 3.4, 3, 2.6, 2.2, 1.8, 1.4]);

    function createInitialState() {
      return {
        level: 1,
        score: 0,
        shotsLeft: 10,
        phase: 'ready',
      };
    }

    function applyShot(state, made) {
      if (state.shotsLeft <= 0 || state.phase === 'roundOver') {
        return state;
      }

      const shotsLeft = state.shotsLeft - 1;
      return {
        ...state,
        score: state.score + (made ? 10 : 0),
        shotsLeft,
        phase: shotsLeft === 0 ? 'roundOver' : state.phase,
      };
    }

    function getDifficulty(level) {
      const numericLevel = Math.trunc(Number(level)) || 1;
      const safeLevel = Math.min(10, Math.max(1, numericLevel));

      return {
        timeLimit: TIME_LIMITS[safeLevel - 1],
        meterSpeed: 0.62 + (safeLevel - 1) * 0.09,
        hitZoneStart: 0.42,
        hitZoneEnd: 0.58,
      };
    }

    function isHit(position, difficulty) {
      if (
        !Number.isFinite(position)
        || !Number.isFinite(difficulty.hitZoneStart)
        || !Number.isFinite(difficulty.hitZoneEnd)
      ) {
        return false;
      }

      return position >= difficulty.hitZoneStart && position <= difficulty.hitZoneEnd;
    }

    function advanceMeter(meter, deltaSeconds, speed) {
      const position = Number.isFinite(meter.position)
        ? Math.min(1, Math.max(0, meter.position))
        : 0;
      const direction = meter.direction === -1 ? -1 : 1;
      const safeDeltaSeconds = Number.isFinite(deltaSeconds) && deltaSeconds >= 0
        ? deltaSeconds
        : 0;
      const safeSpeed = Number.isFinite(speed) && speed >= 0 ? speed : 0;
      let phase = direction === 1 ? position : 2 - position;
      phase = (phase + safeDeltaSeconds * safeSpeed) % 2;
      if (phase < 0) {
        phase += 2;
      }

      return phase < 1
        ? { position: phase, direction: 1 }
        : { position: 2 - phase, direction: -1 };
    }

    function resolveAttempt(attempt, difficulty) {
      if (!Number.isFinite(attempt.remaining) || attempt.remaining <= 0) {
        return { made: false, reason: 'timeout' };
      }

      const made = isHit(attempt.position, difficulty);
      return { made, reason: made ? 'timed' : 'missed' };
    }

    function canShoot(state) {
      return state.phase === 'ready' && state.shotsLeft > 0;
    }

    function evaluateRound(state) {
      if (state.score < 60) {
        return { result: 'failed' };
      }

      return { result: state.level === 10 ? 'completed' : 'passed' };
    }

    function nextRound(state) {
      if (state.level >= 10) {
        return state;
      }

      return {
        level: state.level + 1,
        score: 0,
        shotsLeft: 10,
        phase: 'ready',
      };
    }

    function getTrajectoryPoint(progress) {
      const numericProgress = Number(progress);
      const t = Number.isNaN(numericProgress)
        ? 0
        : Math.min(1, Math.max(0, numericProgress));

      if (t === 0) {
        return { x: 0.18, y: 0.78 };
      }
      if (t === 1) {
        return { x: 0.82, y: 0.32 };
      }

      const x = 0.18 + (0.82 - 0.18) * t;
      const linearY = 0.78 + (0.32 - 0.78) * t;
      return { x, y: linearY - Math.sin(Math.PI * t) * 0.42 };
    }

    globalThis.BasketballCore = {
      createInitialState,
      applyShot,
      getDifficulty,
      isHit,
      advanceMeter,
      resolveAttempt,
      canShoot,
      evaluateRound,
      nextRound,
      getTrajectoryPoint,
    };
  </script>
  <script>
    globalThis.CanvasRenderer = class CanvasRenderer {
      constructor(canvas, core) {
        this.canvas = canvas;
        this.core = core;
        this.context = canvas.getContext('2d');
        this.width = 0;
        this.height = 0;
        this.animationFrame = null;
        this.animationResolve = null;
        this.lastPoint = { x: 0.18, y: 0.78 };
        this.lastResult = null;
        this.handleResize = this.resize.bind(this);

        globalThis.addEventListener('resize', this.handleResize);
        this.resize();
      }

      resize() {
        const bounds = this.canvas.getBoundingClientRect();
        const dpr = Math.min(2, Math.max(1, Number(globalThis.devicePixelRatio) || 1));
        this.width = Math.max(1, bounds.width);
        this.height = Math.max(1, bounds.height);
        this.canvas.width = Math.round(this.width * dpr);
        this.canvas.height = Math.round(this.height * dpr);
        this.context.setTransform(dpr, 0, 0, dpr, 0, 0);
        this.drawScene(this.lastPoint, this.lastResult);
      }

      drawScene(ballPoint = null, made = null) {
        const ctx = this.context;
        const width = this.width;
        const height = this.height;
        const floorTop = height * 0.66;
        const point = ballPoint ?? { x: 0.18, y: 0.78 };

        this.lastPoint = point;
        this.lastResult = made;
        ctx.clearRect(0, 0, width, height);

        const sky = ctx.createLinearGradient(0, 0, 0, floorTop);
        sky.addColorStop(0, '#111827');
        sky.addColorStop(0.62, '#242b38');
        sky.addColorStop(1, '#3a3030');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, width, floorTop);

        ctx.fillStyle = 'rgba(255, 255, 255, 0.18)';
        for (let index = 0; index < 18; index += 1) {
          const x = ((index * 83) % 97) / 97 * width;
          const y = ((index * 47) % 61) / 61 * floorTop * 0.58;
          ctx.fillRect(x, y, 1.5, 1.5);
        }

        const floor = ctx.createLinearGradient(0, floorTop, 0, height);
        floor.addColorStop(0, '#6f351d');
        floor.addColorStop(0.12, '#b96731');
        floor.addColorStop(1, '#7a351b');
        ctx.fillStyle = floor;
        ctx.fillRect(0, floorTop, width, height - floorTop);

        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(64, 25, 13, 0.48)';
        for (let x = -width; x < width * 2; x += Math.max(30, width * 0.075)) {
          ctx.beginPath();
          ctx.moveTo(width * 0.5 + (x - width * 0.5) * 0.35, floorTop);
          ctx.lineTo(x, height);
          ctx.stroke();
        }
        for (let y = floorTop + height * 0.07; y < height; y += height * 0.09) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(width, y);
          ctx.stroke();
        }

        ctx.save();
        ctx.strokeStyle = 'rgba(255, 242, 218, 0.72)';
        ctx.lineWidth = Math.max(2, width * 0.003);
        ctx.beginPath();
        ctx.moveTo(0, floorTop + height * 0.08);
        ctx.lineTo(width, floorTop + height * 0.08);
        ctx.stroke();
        ctx.beginPath();
        ctx.ellipse(width * 0.72, height * 0.94, width * 0.2, height * 0.2, 0, Math.PI, Math.PI * 2);
        ctx.stroke();
        ctx.restore();

        const boardX = width * 0.865;
        const boardY = height * 0.16;
        const boardWidth = width * 0.025;
        const boardHeight = height * 0.31;
        ctx.fillStyle = '#dce4e8';
        ctx.fillRect(boardX, boardY, boardWidth, boardHeight);
        ctx.strokeStyle = '#f9fafb';
        ctx.lineWidth = Math.max(3, width * 0.005);
        ctx.strokeRect(width * 0.79, boardY, width * 0.09, boardHeight);
        ctx.strokeStyle = '#f97316';
        ctx.lineWidth = Math.max(2, width * 0.003);
        ctx.strokeRect(width * 0.815, height * 0.255, width * 0.04, height * 0.105);

        const rimX = width * 0.82;
        const rimY = height * 0.34;
        let glowColor = null;
        if (made === true) {
          glowColor = '54, 201, 107';
        } else if (made === false) {
          glowColor = '239, 68, 68';
        }
        if (glowColor) {
          const glow = ctx.createRadialGradient(rimX, rimY, 2, rimX, rimY, width * 0.12);
          glow.addColorStop(0, `rgba(${glowColor}, 0.72)`);
          glow.addColorStop(1, `rgba(${glowColor}, 0)`);
          ctx.fillStyle = glow;
          ctx.fillRect(rimX - width * 0.14, rimY - width * 0.14, width * 0.28, width * 0.28);
        }

        ctx.strokeStyle = '#ff6a00';
        ctx.lineWidth = Math.max(4, width * 0.007);
        ctx.beginPath();
        ctx.ellipse(rimX, rimY, width * 0.045, height * 0.012, 0, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.72)';
        ctx.lineWidth = Math.max(1, width * 0.0015);
        const netBottomY = rimY + height * 0.12;
        for (let index = 0; index <= 6; index += 1) {
          const topX = rimX - width * 0.04 + width * 0.08 * (index / 6);
          const bottomX = rimX - width * 0.022 + width * 0.044 * (index / 6);
          ctx.beginPath();
          ctx.moveTo(topX, rimY + 3);
          ctx.lineTo(bottomX, netBottomY);
          ctx.stroke();
        }
        for (let row = 1; row <= 3; row += 1) {
          const y = rimY + (netBottomY - rimY) * (row / 4);
          const halfWidth = width * (0.04 - row * 0.005);
          ctx.beginPath();
          ctx.moveTo(rimX - halfWidth, y);
          ctx.lineTo(rimX + halfWidth, y);
          ctx.stroke();
        }

        this.drawBall(point.x, point.y);
      }

      drawBall(x, y) {
        const ctx = this.context;
        const centerX = x * this.width;
        const centerY = y * this.height;
        const radius = Math.min(34, Math.max(18, this.width * 0.032));
        const ball = ctx.createRadialGradient(
          centerX - radius * 0.35,
          centerY - radius * 0.42,
          radius * 0.08,
          centerX,
          centerY,
          radius,
        );
        ball.addColorStop(0, '#ffbd73');
        ball.addColorStop(0.38, '#f58220');
        ball.addColorStop(1, '#a83d08');

        ctx.save();
        ctx.shadowColor = 'rgba(0, 0, 0, 0.45)';
        ctx.shadowBlur = radius * 0.45;
        ctx.shadowOffsetY = radius * 0.25;
        ctx.fillStyle = ball;
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
        ctx.clip();
        ctx.strokeStyle = '#4c1d0b';
        ctx.lineWidth = Math.max(1.5, radius * 0.075);

        ctx.beginPath();
        ctx.arc(centerX, centerY - radius * 1.12, radius * 1.42, Math.PI * 0.24, Math.PI * 0.76);
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(centerX - radius * 1.12, centerY, radius * 1.42, -Math.PI * 0.26, Math.PI * 0.26);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(centerX - radius * 0.82, centerY - radius * 0.58);
        ctx.quadraticCurveTo(
          centerX - radius * 0.2,
          centerY,
          centerX - radius * 0.82,
          centerY + radius * 0.58,
        );
        ctx.moveTo(centerX + radius * 0.82, centerY - radius * 0.58);
        ctx.quadraticCurveTo(
          centerX + radius * 0.2,
          centerY,
          centerX + radius * 0.82,
          centerY + radius * 0.58,
        );
        ctx.stroke();
        ctx.restore();

        ctx.strokeStyle = '#4c1d0b';
        ctx.lineWidth = Math.max(2, radius * 0.09);
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
        ctx.stroke();
      }

      animateShot(made, reducedMotion) {
        this.cancelAnimation();
        return new Promise((resolve) => {
          const finalPoint = this.core.getTrajectoryPoint(1);
          const displayedFinalPoint = made
            ? finalPoint
            : { x: finalPoint.x + 0.1, y: finalPoint.y + 0.12 };

          if (reducedMotion) {
            this.drawScene(displayedFinalPoint, made);
            resolve();
            return;
          }

          const duration = 650;
          let startTime = null;
          this.animationResolve = resolve;
          const frame = (timestamp) => {
            if (startTime === null) {
              startTime = timestamp;
            }
            const progress = Math.min(1, (timestamp - startTime) / duration);
            const trajectoryPoint = this.core.getTrajectoryPoint(progress);
            let point = trajectoryPoint;
            if (!made && progress > 0.72) {
              const missProgress = (progress - 0.72) / 0.28;
              point = {
                x: trajectoryPoint.x + missProgress * 0.1,
                y: trajectoryPoint.y + missProgress * missProgress * 0.12,
              };
            }

            this.drawScene(point, progress === 1 ? made : null);
            if (progress < 1) {
              this.animationFrame = globalThis.requestAnimationFrame(frame);
              return;
            }

            this.animationFrame = null;
            this.animationResolve = null;
            resolve();
          };

          this.animationFrame = globalThis.requestAnimationFrame(frame);
        });
      }

      cancelAnimation() {
        if (this.animationFrame !== null) {
          globalThis.cancelAnimationFrame(this.animationFrame);
          this.animationFrame = null;
        }
        if (this.animationResolve) {
          const resolve = this.animationResolve;
          this.animationResolve = null;
          resolve();
        }
      }

      destroy() {
        this.cancelAnimation();
        globalThis.removeEventListener('resize', this.handleResize);
      }
    };

    globalThis.GameController = class GameController {
      constructor(core, renderer, elements) {
        this.core = core;
        this.renderer = renderer;
        this.elements = elements;
        this.state = core.createInitialState();
        this.meter = { position: 0, direction: 1 };
        this.remaining = core.getDifficulty(this.state.level).timeLimit;
        this.frameId = null;
        this.resultTimer = null;
        this.lastTimestamp = null;
        this.phaseBeforePause = null;
        this.dialogAction = 'start';
        this.destroyed = false;
        this.reducedMotion = globalThis.matchMedia
          ? globalThis.matchMedia('(prefers-reduced-motion: reduce)').matches
          : false;

        this.update = this.update.bind(this);
        this.handleVisibility = this.handleVisibility.bind(this);
        this.handleShootClick = () => this.shoot(false);
        this.handleDialogClick = () => this.runDialogAction();
        this.handleKeydown = (event) => {
          if (event.code !== 'Space' || event.repeat || !this.elements.dialog.hidden) {
            return;
          }
          event.preventDefault();
          this.shoot(false);
        };

        this.elements.shootButton.addEventListener('click', this.handleShootClick);
        this.elements.dialogButton.addEventListener('click', this.handleDialogClick);
        document.addEventListener('keydown', this.handleKeydown);
        document.addEventListener('visibilitychange', this.handleVisibility);
        this.renderHud();
      }

      startGame() {
        this.cancelLoop();
        this.clearResultTimer();
        this.state = this.core.createInitialState();
        this.hideDialog();
        this.startAttempt();
      }

      startAttempt() {
        this.cancelLoop();
        this.clearResultTimer();
        this.state = { ...this.state, phase: 'ready' };
        this.meter = { position: 0, direction: 1 };
        this.remaining = this.core.getDifficulty(this.state.level).timeLimit;
        this.lastTimestamp = null;
        this.elements.statusMessage.textContent = `第 ${this.state.level} 关：瞄准绿色最佳区域！`;
        this.renderer.drawScene();
        this.renderHud();
        this.frameId = globalThis.requestAnimationFrame(this.update);
      }

      update(timestamp) {
        this.frameId = null;
        if (this.state.phase !== 'ready' || this.destroyed) {
          return;
        }

        if (this.lastTimestamp === null) {
          this.lastTimestamp = timestamp;
        } else {
          const deltaSeconds = Math.min(0.1, Math.max(0, (timestamp - this.lastTimestamp) / 1000));
          this.lastTimestamp = timestamp;
          const difficulty = this.core.getDifficulty(this.state.level);
          this.meter = this.core.advanceMeter(this.meter, deltaSeconds, difficulty.meterSpeed);
          this.remaining = Math.max(0, this.remaining - deltaSeconds);
          this.renderHud();
          if (this.remaining <= 0) {
            void this.shoot(true);
            return;
          }
        }

        this.frameId = globalThis.requestAnimationFrame(this.update);
      }

      async shoot(timedOut = false) {
        if (!this.core.canShoot(this.state)) {
          return;
        }

        this.state = { ...this.state, phase: 'animating' };
        this.cancelLoop();
        this.renderHud();
        const difficulty = this.core.getDifficulty(this.state.level);
        const result = timedOut
          ? { made: false, reason: 'timeout' }
          : this.core.resolveAttempt({
            remaining: this.remaining,
            position: this.meter.position,
          }, difficulty);

        this.elements.statusMessage.textContent = result.reason === 'timeout'
          ? '时间到，本次投篮未命中。'
          : result.made ? '漂亮！空心入网！' : '差一点，再调整时机！';
        await this.renderer.animateShot(result.made, this.reducedMotion);
        if (!this.destroyed) {
          this.finishAttempt(result.made);
        }
      }

      finishAttempt(made) {
        this.state = this.core.applyShot(this.state, made);
        this.renderHud();
        if (this.state.shotsLeft === 0) {
          this.finishRound();
          return;
        }

        this.resultTimer = globalThis.setTimeout(() => {
          this.resultTimer = null;
          this.startAttempt();
        }, this.reducedMotion ? 80 : 350);
      }

      finishRound() {
        const evaluation = this.core.evaluateRound(this.state);
        if (evaluation.result === 'failed') {
          this.showDialog(
            '本关挑战失败',
            `本关得到 ${this.state.score} 分，还差 ${Math.max(0, 60 - this.state.score)} 分晋级。`,
            '重试本关',
            'retry',
          );
          return;
        }
        if (evaluation.result === 'completed') {
          this.showDialog(
            '十关全部完成！',
            '你征服了全部关卡，成为真正的压哨投篮王。',
            '重新开始',
            'restart',
          );
          return;
        }
        this.showDialog(
          `第 ${this.state.level} 关通过！`,
          `本关得到 ${this.state.score} 分，下一关节奏会更快。`,
          '进入下一关',
          'next',
        );
      }

      retryLevel() {
        this.state = {
          level: this.state.level,
          score: 0,
          shotsLeft: 10,
          phase: 'ready',
        };
        this.hideDialog();
        this.startAttempt();
      }

      advanceLevel() {
        this.state = this.core.nextRound(this.state);
        this.hideDialog();
        this.startAttempt();
      }

      runDialogAction() {
        if (this.dialogAction === 'retry') {
          this.retryLevel();
        } else if (this.dialogAction === 'next') {
          this.advanceLevel();
        } else {
          this.startGame();
        }
      }

      showDialog(title, message, buttonLabel, action) {
        this.dialogAction = action;
        this.elements.dialogTitle.textContent = title;
        this.elements.dialogMessage.textContent = message;
        this.elements.dialogButton.textContent = buttonLabel;
        this.elements.dialog.hidden = false;
        this.elements.gameShell.inert = true;
        this.elements.dialogButton.focus();
      }

      hideDialog() {
        this.elements.dialog.hidden = true;
        this.elements.gameShell.inert = false;
      }

      handleVisibility() {
        if (document.hidden && this.state.phase === 'ready') {
          this.phaseBeforePause = 'ready';
          this.state = { ...this.state, phase: 'paused' };
          this.cancelLoop();
          this.renderHud();
          return;
        }
        if (!document.hidden && this.state.phase === 'paused' && this.phaseBeforePause === 'ready') {
          this.phaseBeforePause = null;
          this.state = { ...this.state, phase: 'ready' };
          this.lastTimestamp = null;
          this.renderHud();
          this.frameId = globalThis.requestAnimationFrame(this.update);
        }
      }

      renderHud() {
        const difficulty = this.core.getDifficulty(this.state.level);
        this.elements.levelValue.textContent = String(this.state.level);
        this.elements.scoreValue.textContent = String(this.state.score);
        this.elements.shotsValue.textContent = String(this.state.shotsLeft);
        this.elements.timeValue.textContent = difficulty.timeLimit.toFixed(1);
        this.elements.countdownValue.textContent = Math.max(0, this.remaining).toFixed(1);
        this.elements.meterNeedle.style.left = `${this.meter.position * 100}%`;
        this.elements.meter.setAttribute('aria-valuenow', String(Math.round(this.meter.position * 100)));
        this.elements.shootButton.disabled = !this.core.canShoot(this.state);
      }

      cancelLoop() {
        if (this.frameId !== null) {
          globalThis.cancelAnimationFrame(this.frameId);
          this.frameId = null;
        }
      }

      clearResultTimer() {
        if (this.resultTimer !== null) {
          globalThis.clearTimeout(this.resultTimer);
          this.resultTimer = null;
        }
      }

      destroy() {
        this.destroyed = true;
        this.cancelLoop();
        this.clearResultTimer();
        this.elements.shootButton.removeEventListener('click', this.handleShootClick);
        this.elements.dialogButton.removeEventListener('click', this.handleDialogClick);
        document.removeEventListener('keydown', this.handleKeydown);
        document.removeEventListener('visibilitychange', this.handleVisibility);
        this.renderer.destroy();
      }
    };

    const gameCanvas = document.getElementById('gameCanvas');
    if (gameCanvas && globalThis.BasketballCore) {
      globalThis.basketballRenderer = new globalThis.CanvasRenderer(
        gameCanvas,
        globalThis.BasketballCore,
      );
      globalThis.basketballGame = new globalThis.GameController(
        globalThis.BasketballCore,
        globalThis.basketballRenderer,
        {
          gameShell: document.querySelector('.game-shell'),
          levelValue: document.getElementById('levelValue'),
          scoreValue: document.getElementById('scoreValue'),
          shotsValue: document.getElementById('shotsValue'),
          timeValue: document.getElementById('timeValue'),
          countdownValue: document.getElementById('countdownValue'),
          meter: document.querySelector('.timing-meter'),
          meterNeedle: document.getElementById('meterNeedle'),
          shootButton: document.getElementById('shootButton'),
          statusMessage: document.getElementById('statusMessage'),
          dialog: document.getElementById('gameDialog'),
          dialogTitle: document.getElementById('dialogTitle'),
          dialogMessage: document.getElementById('dialogMessage'),
          dialogButton: document.getElementById('dialogButton'),
        },
      );
    }
  </script>
</body>
</html>
